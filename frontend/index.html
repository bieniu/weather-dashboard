<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stacja pogodowa</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json" />
  <!-- Apple touch icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <!-- iOS meta -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Stacja pogodowa" />
  <!-- Theme color -->
  <meta name="theme-color" content="#1976D2" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0F172A" media="(prefers-color-scheme: dark)" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js" defer></script>

  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header__inner">
      <span class="header__title">
        Łowicz, Browarna
      </span>
      <div class="header__actions">
        <span id="connection-status" class="status status--disconnected" role="status">
          <span class="status__dot"></span>
          <span class="status__label">Rozłączono</span>
        </span>
        <button class="theme-btn" id="theme-toggle" aria-label="Przełącz motyw">
          <span class="material-symbols-rounded">dark_mode</span>
        </button>
      </div>
    </div>
  </header>

  <main class="main">
    <div class="grid" id="weather-grid"></div>
  </main>

  <script src="app.js" type="module"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js");
      });
    }
  </script>
</body>
</html>
