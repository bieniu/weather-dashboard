services:
  weather-dashboard:
    build: .
    image: weather-dashboard:1.5.4
    container_name: weather-dashboard
    restart: unless-stopped
    ports:
      - "8332:8332"
    volumes:
      - weather-db:/data
    environment:
      - TZ=${TZ}
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - DOMAIN=${DOMAIN:-localhost}
      - PORT=${PORT:-8332}
      - SCHEME=${SCHEME:-http}
      - UMAMI_HOST=${UMAMI_HOST}
      - UMAMI_ID=${UMAMI_ID}

volumes:
  weather-db:
