services:
  weather-dashboard:
    build: .
    container_name: weather-dashboard
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - weather-db:/data
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}

volumes:
  weather-db:
