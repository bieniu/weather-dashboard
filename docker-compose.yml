services:
  weather-dashboard:
    build: .
    image: weather-dashboard:1.0.0
    container_name: weather-dashboard
    restart: unless-stopped
    ports:
      - "8332:8000"
    volumes:
      - weather-db:/data
    environment:
      - MQTT_BROKER=${MQTT_BROKER}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USER=${MQTT_USER}
      - MQTT_PASSWORD=${MQTT_PASSWORD}
      - DOMAIN=${DOMAIN:-localhost}
      - PORT=${PORT:-8000}
      - SCHEME=${SCHEME:-http}

volumes:
  weather-db:
